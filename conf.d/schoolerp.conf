server {
    listen 80;
    server_name schoolerp.mdabdullahalsadid.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name schoolerp.mdabdullahalsadid.com;


    ssl_certificate /etc/letsencrypt/live/mdabdullahalsadid.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/mdabdullahalsadid.com/privkey.pem;

    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-XSS-Protection "1; mode=block";
    add_header X-Content-Type-Options "nosniff";


    location / {
        limit_req zone=api burst=20 nodelay;
        limit_req_status 429;
        proxy_pass http://localhost:8001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Cookie $http_cookie;
    }

    location /static/ {
        alias /opt/schoolerp/staticfiles/;
        access_log off;
        expires 30d;
        add_header Cache-Control "public";
    }

    location /media/ {
        alias /opt/schoolerp/media/;
    }
}
