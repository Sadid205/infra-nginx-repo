name: Deploy Nginx Config

on:
  push:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Ensure target directory exists
        uses: appleboy/ssh-action@v1.0.3

        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.HOST_USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            sudo mkdir -p /opt/infra/nginx
            sudo chown -R ${{ secrets.HOST_USERNAME }}:${{ secrets.HOST_USERNAME }} /opt/infra/nginx

      - name: Sync to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.HOST_USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          source: "."
          target: "/opt/infra/nginx"

      - name: Reload Nginx
        uses: appleboy/ssh-action@v1.0.3

        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.HOST_USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            sudo cp /opt/infra/nginx/nginx.conf /etc/nginx/nginx.conf
            sudo cp /opt/infra/nginx/conf.d/*.conf /etc/nginx/conf.d/
            sudo nginx -t && sudo nginx -s reload
